<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>花火记 · 图文详情</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <main class="stage" aria-label="花火记 · 图文详情">
    <div class="iphone">
      <div class="device-glow"></div>
      <div class="island" aria-hidden="true"></div>
      <div class="statusbar" aria-hidden="true">
        <span>9:41</span>
        <span class="status-icons">
          <span class="signal"><i></i><i></i><i></i><i></i></span>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none" aria-hidden="true">
            <path d="M2 4.8C5.5 1.8 10.5 1.8 14 4.8M4.7 7.3C6.6 5.8 9.4 5.8 11.3 7.3M7.2 9.6C7.7 9.2 8.3 9.2 8.8 9.6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          <span class="battery"><span></span></span>
        </span>
      </div>

      <div class="app app-page">
        <section class="screen detail-screen active" id="detailScreen" data-od-id="note-detail-page" aria-label="图文详情页">
        <article class="detail-sheet" aria-label="图文详情">
          <div class="note-topbar">
            <button class="close-sheet" type="button" id="closeDetail" aria-label="返回首页">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="m15 18-6-6 6-6"/>
              </svg>
            </button>
            <div class="note-top-author">
              <span class="avatar"></span>
              <strong id="detailAuthorTop">作者</strong>
            </div>
            <div class="note-top-actions">
              <button class="note-follow" type="button">关注</button>
              <button class="note-icon" type="button" aria-label="更多">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <circle cx="5" cy="12" r="1.2"/>
                  <circle cx="12" cy="12" r="1.2"/>
                  <circle cx="19" cy="12" r="1.2"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="detail-preview" id="detailHero">
            <div class="mini-scene"><div class="scene-card"></div></div>
            <div class="note-dots" aria-hidden="true"><i></i><i></i><i></i></div>
          </div>
          <div class="note-content">
            <div class="note-author-card">
              <div class="note-author-main">
                <span class="avatar"></span>
                <div>
                  <strong id="detailAuthor">作者</strong>
                  <span id="detailAuthorBio">摄影 / 插画灵感记录者</span>
                </div>
              </div>
              <button class="note-follow" type="button">关注</button>
            </div>
            <h2 class="detail-title" id="detailTitle">选择一条灵感</h2>
            <p class="detail-copy" id="detailCopy">从首页点开卡片后，这里会展示完整图文内容。</p>
            <div class="note-tags" id="detailTags" aria-label="话题标签"></div>
            <div class="note-time" id="detailTime">今天 18:24 · 花火记</div>
          </div>
          <section class="comment-card" aria-label="评论区">
            <div class="comment-head">
              <h3>评论</h3>
              <span id="detailCommentCount">0 条</span>
            </div>
            <div id="detailComments"></div>
          </section>
          <div class="note-bottom" aria-label="互动栏">
            <button class="comment-input" type="button">说点什么...</button>
            <div class="note-actions">
              <button class="note-action" type="button" id="detailLikeAction" aria-label="喜欢">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/>
                </svg>
                <span id="detailLikes">0</span>
              </button>
              <button class="note-action" type="button" aria-label="评论">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M21 11.5a8.5 8.5 0 0 1-9 8.5 8.7 8.7 0 0 1-4.3-1.1L3 20l1.2-4.2A8.4 8.4 0 0 1 3 11.5a8.5 8.5 0 0 1 18 0z"/>
                </svg>
                <span id="detailCommentAction">0</span>
              </button>
              <button class="note-action" type="button" aria-label="分享">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M4 12v7a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-7"/>
                  <path d="M16 6 12 2 8 6"/>
                  <path d="M12 2v14"/>
                </svg>
              </button>
            </div>
          </div>
        </article>
        </section>
      </div>
      <div class="home-indicator" aria-hidden="true"></div>
    </div>
  </main>

  <script src="js/posts.js" defer></script>
  <script src="js/detail.js" defer></script>
</body>
</html>
